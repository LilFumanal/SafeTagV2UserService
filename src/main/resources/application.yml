server:
  port: 8084

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/users
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: ${JWT_SECRET:SuperSecretKeyForLocalDevelopmentOnlyThatIsLongEnough}
  expiration: ${JWT_EXPIRATION:86400000}